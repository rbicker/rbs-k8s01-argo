---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lette-backend-https
spec:
  parentRefs:
    - name: k8s01-lb01
      namespace: gateway
      sectionName: https
  hostnames:
    - backend.lette.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: lette-backend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lette-backend-http-redirect
spec:
  parentRefs:
    - name: k8s01-lb01
      namespace: gateway
      sectionName: http
  hostnames:
    - backend.lette.io
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
