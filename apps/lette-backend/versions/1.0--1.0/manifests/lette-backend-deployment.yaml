
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lette-backend
  labels:
    app: lette-backend
    app.kubernetes.io/name: lette-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lette-backend
  template:
    metadata:
      labels:
        app: lette-backend
    spec:
      containers:
        - name: lette-backend
          image: registry.asdf.ooo/lette-pocketbase:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          volumeMounts:
            - name: pb-data
              mountPath: /pb/pb_data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          env:
            - name: LITESTREAM_REPLICATION_URL
              value: s3://fsn1.your-objectstorage.com/rbs01/lette/backend/data.db
            - name: LITESTREAM_REGION
              value: fsn1
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: litestream
                  key: access-key-id
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: litestream
                  key: secret-access-key
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe
                  key: secret-key
            - name: STRIPE_PRICE_ID
              value: price_1Tv0oOCz3lzvn3gM2Hu6eSSZ
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe
                  key: webhook-secret
            - name: STRIPE_CHECKOUT_SUCCESS_URL
              value: https://console.lette.io/app/onboard/payment/success
            - name: STRIPE_BILLING_CHECKOUT_SUCCESS_URL
              value: https://billing.lette.io/app
            - name: STRIPE_BILLING_PORTAL_RETURN_URL
              value: https://billing.lette.io/app
            - name: LETTE_BILLING_URL
              value: https://billing.lette.io
            - name: LETTE_CONSOLE_URL
              value: https://console.lette.io
            - name: MICROSOFT_TENANT_LOOKUP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: microsoft-tenant-lookup
                  key: client-id
            - name: MICROSOFT_TENANT_LOOKUP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: microsoft-tenant-lookup
                  key: client-secret
            - name: MICROSOFT_TENANT_LOOKUP_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: microsoft-tenant-lookup
                  key: tenant-id
            - name: MICROSOFT_TENANT_LOOKUP_FORCE_SYNC_ON_STARTUP
              value: "true"
          
      volumes:
        - name: pb-data
          persistentVolumeClaim:
            claimName: pb-data
        - name: litestream-config
          configMap:
            name: litestream
