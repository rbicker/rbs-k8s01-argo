---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k8s01-lb01
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      load-balancer.hetzner.cloud/location: "nbg1"
      load-balancer.hetzner.cloud/name: "k8s01-lb01"
      # load-balancer.hetzner.cloud/uses-proxyprotocol: "true"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: cert-lette-web
          - kind: Secret
            name: cert-oana-asdf
      allowedRoutes:
        namespaces:
          from: All
