---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lette
spec:
  secretName: cert-lette
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-namecom
  dnsNames:
    - lette.io
    - www.lette.io
    - backend.lette.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: oana-asdf
spec:
  secretName: cert-oana-asdf
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-namecom
  dnsNames:
    - oana.asdf.ooo
