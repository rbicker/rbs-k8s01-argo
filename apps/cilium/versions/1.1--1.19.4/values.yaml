gatewayAPI:
  enabled: true
  xffNumTrustedHops: 1

# Retest on 1.19.4 before enabling this together with the Hetzner LB
# PROXY protocol annotation. The observations below were from the 1.18.6
# deployment path and should not be assumed to still apply after the upgrade.
# enableProxyProtocol: true

# 1.18.6 observations kept here for reference:
# Cilium Envoy was not accepting PROXY protocol on the Gateway listener.
#
# The live listener config for gateway/cilium-gateway-k8s01-lb01/listener had:
# envoy.filters.listener.tls_inspector
# cilium.bpf_metadata
#
# It did not have:
# envoy.filters.listener.proxy_protocol
#
# That meant the Hetzner LB could send PROXY protocol while Envoy still tried
# to interpret the connection as plain TLS, breaking the public HTTPS listener.
