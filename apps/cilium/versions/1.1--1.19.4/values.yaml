
kubeProxyReplacement: "true"

routingMode: native
ipv4NativeRoutingCIDR: 10.0.16.0/20

bpf:
  masquerade: false

ipam:
  mode: kubernetes

k8sServiceHost: 127.0.0.1
k8sServicePort: 7445   # Talos kube-prism

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

loadBalancer:
  acceleration: native

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

encryption:
  enabled: false
  type: wireguard

defaultLBServiceIPAM: "lbipam"

nodePort:
  enabled: true

# ---

# Customizing starts here, above are defaults from terraform module

hubble:
  enabled: true

  relay:
    enabled: true

  ui:
    enabled: true

  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - http

prometheus:
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

operator:
  replicas: 2 # Actually this is a default from the terraform module
  prometheus:
    serviceMonitor:
      enabled: true

